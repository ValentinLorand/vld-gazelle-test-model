id : ITI-19
name : Authenticate Node
version : 20.0
description : 
  value: "In the Authenticate Node transaction, the local Secure Node presents its identity to a remote Secure Node, and authenticates the identity of the 
  remote node. After this mutual authentication, other secure transactions may take place through this secure pipe between the two nodes."
status: Final text
documentation: https://profiles.ihe.net/ITI/TF/Volume2/ITI-19.html
standards: 
  - DICOM PS3.15
  - RFC5276
  - RFC3851
  - RFC6125
  - BCP195
  - X.509
  - WS-I Basic Security Profile